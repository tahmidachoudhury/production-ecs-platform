name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - "Infra/**"
      - "!Infra/envs/*.tfvars"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{secrets.AWS_REGION}}
          role-to-assume: ${{secrets.AWS_DEPLOY_IAM_ARN}}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init -reconfigure

      - name: Terraform Plan
        run: |
          set +e
          terraform plan \
            -var-file=envs/dev.tfvars \
            -out=tfplan 
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 1 ]; then
            echo "Terraform plan failed with error"
            exit 1
          fi
          exit 0

      - name: Terraform Apply
        run: terraform apply -var-file="envs/dev.tfvars" --auto-approve tfplan

      - name: Terraform Output
        run: terraform output
        continue-on-error: true

  health-check:
    name: Post-Deploy Health Check
    needs: terraform-apply
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Health Check
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          HEALTH_URL="https://${DOMAIN_NAME}/api/heartbeat"
          echo "Checking health at: $HEALTH_URL"

          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL 2>/dev/null)
            if [ $? -ne 0 ] || [ -z "$HTTP_CODE" ]; then
              HTTP_CODE="000"
            fi

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed! (HTTP $HTTP_CODE)"
              exit 0
            else
              echo "Health check failed (HTTP $HTTP_CODE). Retry $((RETRY_COUNT+1))/$MAX_RETRIES"
              RETRY_COUNT=$((RETRY_COUNT+1))
              sleep 30
            fi
          done

          echo "Health check failed after $MAX_RETRIES attempts"
          exit 1
